name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        shell: pwsh
        run: |
          $env:MOON_HOME = "$env:USERPROFILE\.moon"
          Invoke-WebRequest -Uri https://cli.moonbitlang.com/install/powershell.ps1 -OutFile install.ps1
          ./install.ps1
          "$env:MOON_HOME\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: MoonBit check and test
        run: |
          moon check --target js
          moon test --target js
      - name: Demo build
        working-directory: examples/moon-jumper-web
        run: |
          npm install
          npm run build
      - name: Browser smoke test
        working-directory: examples/moon-jumper-web
        run: |
          npx playwright install chromium
          npm run smoke
